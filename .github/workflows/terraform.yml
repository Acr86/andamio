# Terraform blueprint gates. This tree is validated, never deployed: fmt,
# init -backend=false, validate, tflint and Checkov run for every cloud and
# environment on every change. The plan/apply path exists behind an explicit
# repository variable (ENABLE_CLOUD) so the design is executable, not dead —
# see drift.yml for the scheduled drift-detection counterpart.
name: terraform

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.13.5"

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - run: terraform fmt -check -recursive infra/terraform

  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, gcp]
        environment: [staging, prod]
    env:
      TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.tfcache
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Provider plugin cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .tfcache
          key: tf-plugins-${{ matrix.cloud }}-${{ hashFiles(format('infra/terraform/envs/{0}/{1}/.terraform.lock.hcl', matrix.environment, matrix.cloud)) }}
      - name: Validate ${{ matrix.environment }}/${{ matrix.cloud }}
        run: |
          mkdir -p .tfcache
          terraform -chdir="infra/terraform/envs/${{ matrix.environment }}/${{ matrix.cloud }}" init -backend=false -input=false
          terraform -chdir="infra/terraform/envs/${{ matrix.environment }}/${{ matrix.cloud }}" validate

  tflint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cloud: [aws, gcp]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4
      - name: Lint modules and envs (${{ matrix.cloud }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # plugin downloads, avoids rate limits
        run: |
          tflint --init --config "$(pwd)/infra/terraform/.tflint.hcl"
          for dir in infra/terraform/modules/${{ matrix.cloud }}/* infra/terraform/envs/*/${{ matrix.cloud }}; do
            echo "==> $dir"
            tflint --config "$(pwd)/infra/terraform/.tflint.hcl" --chdir "$dir"
          done

  checkov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Policy-as-code scan (hard gate)
        run: |
          pip install --quiet checkov
          checkov --directory infra/terraform --quiet --compact
