# Render the README demo GIF from docs/demo/golden-path.tape. vhs needs ttyd,
# which is a Linux/macOS tool — so the recording is produced here rather than
# on a contributor's machine, and the .tape (not the binary GIF) is the
# reviewable source of truth. Manual trigger: the demo changes rarely.
name: demo

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true
          cache-dependency-glob: "platform-cli/uv.lock"

      - name: Warm the CLI environment so the recording shows commands, not installs
        run: uv sync --project platform-cli --extra dev

      - name: Render the tape
        uses: charmbracelet/vhs-action@59641cdc7fadf3978db65eb8c6937ea2752f4ec3 # v2
        with:
          path: docs/demo/golden-path.tape

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: golden-path-gif
          path: docs/demo/golden-path.gif
          if-no-files-found: error
